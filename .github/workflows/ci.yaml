name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update MoonBit dependencies
        run: |
            moon version --all
            moon update


      - name: moon check
        run: moon check

      - name: moon build
        run: moon build --target native

      - name: moon test
        run: moon test

      - name: Run e2e compilation tests
        run: bash scripts/e2e_test.sh
